syntax = "proto3";

package chat;
option go_package = "proto-service/gen/chat";

service ChatService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
}

message SendMessageRequest {
  int64 sender_id = 1;
  string room_id = 2;
  string text = 3;
}

message SendMessageResponse {
  string message_id = 1;
  int64 sender_id = 2;
  string room_id = 3;
  bool success = 4;
}