syntax = "proto3";

package auth;
option go_package = "protos-service/gen/sso";

service Auth {
  rpc Register(RegisterRequest) returns (RegisterResponse);

  rpc Login(LoginRequest) returns (LoginResponse);

  rpc GetMe(GetMeRequest) returns (GetMeResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
}

message RegisterResponse {
  int64 user_id = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
  int32 app_id = 3;
}

message LoginResponse {
  string token = 1;
}

message GetMeRequest {
  string token = 1;
}

message GetMeResponse {
  int64 player_id = 1;
  string username = 2;
  string firstname = 3;
  string lastname = 4;
  string email = 5;
}


